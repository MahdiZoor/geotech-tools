<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockfall Toolkit — Protected</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1320;
    --card:#161d2e;
    --card-2:#19223450;
    --line:#28344a;
    --text:#e9edf5;
    --muted:#7d8aa3;
    --amber:#e8732e;
    --amber-hover:#f0833f;
    --blue:#3a6ea8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{
    position:relative;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    width:100%;max-width:470px;
    overflow:hidden;
    box-shadow:0 20px 60px -20px rgba(0,0,0,0.6);
  }
  /* gradient top accent bar */
  .card::before{
    content:'';
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,#e8732e 0%,#c75a8a 45%,#3aa6c7 100%);
  }
  .head{padding:30px 32px 22px;border-bottom:1px solid var(--line);}
  .eyebrow{
    font-size:12px;font-weight:700;letter-spacing:0.12em;
    margin:0 0 14px;
  }
  .eyebrow .mz{color:var(--amber);}
  .eyebrow .geo{color:#b9c3d6;}
  h1{font-size:21px;margin:0 0 6px;font-weight:700;letter-spacing:0.2px;}
  .sub{margin:0;color:var(--muted);font-size:14px;line-height:1.5;}
  .body{padding:24px 32px 30px;}
  label{
    display:block;font-size:11.5px;font-weight:600;
    letter-spacing:0.1em;text-transform:uppercase;
    color:#9aa6bd;margin-bottom:10px;
  }
  .row{display:flex;gap:12px;align-items:stretch;}
  input[type=password]{
    flex:1;min-width:0;
    padding:12px 14px;border-radius:9px;
    border:1px solid var(--line);background:#0f1626;
    color:var(--text);font-size:15px;outline:none;
    transition:border-color .15s;
  }
  input[type=password]::placeholder{color:#5d6982;}
  input[type=password]:focus{border-color:var(--amber);}
  button{
    flex:0 0 auto;
    padding:12px 26px;border:none;border-radius:9px;
    background:var(--amber);color:#fff;
    font-size:15px;font-weight:600;cursor:pointer;
    transition:background .15s;
  }
  button:hover:not(:disabled){background:var(--amber-hover);}
  button:disabled{opacity:.6;cursor:default;}
  .msg{margin-top:14px;font-size:13px;min-height:18px;text-align:center;}
  .msg.err{color:#e87a7a;}
  .msg.ok{color:var(--amber);}
  .contact{
    margin:18px 0 0;text-align:center;
    font-size:13px;color:var(--muted);
  }
  .contact a{color:var(--muted);text-decoration:none;}
  .contact a:hover{color:#9aa6bd;}
</style>
</head>
<body>
<div class="gate">
  <div class="card">
    <div class="head">
      <div class="eyebrow"><span class="mz">MZ</span><span class="geo">GEOTECHNICS</span></div>
      <h1>Rockfall Toolkit</h1>
      <p class="sub">Enter the password to access this tool</p>
    </div>
    <div class="body">
      <label for="pw">Password</label>
      <div class="row">
        <input type="password" id="pw" placeholder="Enter password" autocomplete="off" autofocus />
        <button id="go">Unlock</button>
      </div>
      <div class="msg" id="msg"></div>
      <p class="contact">Contact <a href="https://mzgeotechnics.com" target="_blank" rel="noopener">mzgeotechnics.com</a> for access</p>
      <p class="contact" style="color:#5a6b7a;margin-top:10px;font-size:11px;line-height:1.5;">© 2026 Mahdi Zoorabadi. All rights reserved. Proprietary tool — unauthorised copying, redistribution, or reuse is prohibited.</p>
    </div>
  </div>
</div>

      var salt=b64ToBytes(_meta.salt), iv=b64ToBytes(_meta.iv), data=b64ToBytes(_ct());
      var key=await deriveKey(pw,salt,_meta.iter);
      var ptBuf=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,data);
      var html=new TextDecoder().decode(ptBuf);
      setMsg("Unlocked.","ok");
      var doc=document.open("text/html","replace");
      doc.write(html); doc.close();
    }catch(e){
      btn.disabled=false;
      setMsg("Incorrect password, or the file is corrupted.","err");
    }
  }
  document.getElementById("go").addEventListener("click",unlock);
  document.getElementById("pw").addEventListener("keydown",function(e){ if(e.key==="Enter"){ unlock(); } });
})();
</script>
</body>
</html>
