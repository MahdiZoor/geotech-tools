<title>1D Nonlinear Site Response — MZ Geotechnics</title>
<style>
:root{--bg:#0e1726;--bg2:#0a1320;--card:#131d2e;--line:rgba(255,255,255,.07);--muted:#7e93b2;--muted2:#5c6f8c;--text:#e9f0ff;--accent:#e8742c;--accent2:#f0913f;}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0c1422,#0e1726 45%,#091020);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.gate{width:100%;max-width:560px;background:linear-gradient(180deg,#16213400,#0e172600);border-radius:14px;overflow:hidden}
.gate .top{padding:34px 36px 26px;border-bottom:1px solid var(--line)}
.brand{font-size:14px;font-weight:700;letter-spacing:1.2px;margin:0 0 20px}
.brand .mz{color:var(--accent)}
.brand .rest{color:#cdd9ee}
.gate h1{margin:0 0 10px;font-size:30px;font-weight:750;letter-spacing:-.3px}
.gate .sub{margin:0;color:var(--muted);font-size:16px}
.gate .body{padding:26px 36px 14px}
.lbl{display:block;font-size:12px;font-weight:700;letter-spacing:1.3px;color:var(--muted);margin:0 0 11px}
.inrow{display:flex;gap:14px;align-items:stretch}
#pw{flex:1;background:#0c1322;border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:15px 16px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s,box-shadow .15s}
#pw::placeholder{color:#54678a}
#pw:focus{border-color:rgba(232,116,44,.55);box-shadow:0 0 0 3px rgba(232,116,44,.13)}
#go{background:var(--accent);color:#fff;border:none;border-radius:11px;padding:0 30px;font-size:17px;font-weight:700;cursor:pointer;transition:background .15s,transform .05s}
#go:hover{background:var(--accent2)}
#go:active{transform:scale(.985)}
#go:disabled{opacity:.6;cursor:wait}
.msg{min-height:22px;margin:16px 2px 0;font-size:14px}
.msg.err{color:#ff7a6b}
.msg.ok{color:#41d49a}
.msg.work{color:var(--muted)}
.foot{padding:30px 36px 34px;text-align:center}
.foot .contact{color:var(--muted);font-size:15px;margin:0 0 18px}
.foot .legal{color:var(--muted2);font-size:13px;line-height:1.6;margin:0;max-width:480px;margin-left:auto;margin-right:auto}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:var(--accent2);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

  const msgEl = document.getElementById('msg');
  function b64ToBytes(b64){
    const bin = atob(b64); const u = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i);
    return u;
  }
  function setMsg(t, cls){ msgEl.className='msg '+(cls||''); msgEl.innerHTML=t; }

  async function deriveKey(password, saltBytes, iters){
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:saltBytes, iterations:iters, hash:'SHA-256'},
      baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']);
  }

  async function unlock(){
    const password = pwEl.value;
    if(!password){ setMsg('Please enter the password.', 'err'); return; }
    goEl.disabled=true;
    setMsg('<span class="spin"></span>Deriving key and decrypting…', 'work');
    try{
      const salt = b64ToBytes(blob.salt);
      const iv   = b64ToBytes(blob.iv);
      const ct   = b64ToBytes(blob.ct);
      const key  = await deriveKey(password, salt, blob.it);
      let plainBuf;
      try{
        plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct);
      }catch(e){
        setMsg('Incorrect password. Please try again.', 'err');
        goEl.disabled=false; pwEl.select(); return;
      }
      const html = new TextDecoder().decode(plainBuf);
      setMsg('<span class="spin"></span>Loading tool…', 'ok');
      // Replace the entire document with the decrypted tool.
      // Use a fresh document write so the tool's own <head>/<body>/scripts run.
      setTimeout(function(){
        document.open();
        document.write(html);
        document.close();
      }, 120);
    }catch(err){
      setMsg('Unexpected error: '+(err && err.message ? err.message : err), 'err');
      goEl.disabled=false;
    }
  }
  goEl.addEventListener('click', unlock);
  pwEl.addEventListener('keydown', function(e){ if(e.key==='Enter') unlock(); });
})();
</script>
</body>
</html>
